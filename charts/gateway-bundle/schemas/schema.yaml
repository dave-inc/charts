$schema: http://json-schema.org/draft-07/schema#
type: object
properties:
  nameOverride:
    type: string

  fullnameOverride:
    type: string

  additionalLabels:
    type: object
    additionalProperties:
      type: string

  gatewayAnnotations:
    type: object
    additionalProperties:
      type: string

  gatewaySpec:
    type: object
    properties:
      gatewayClassName:
        type: string
    additionalProperties: false

    required:
      - gatewayClassName

  listenerSpec:
    $ref: ./globalListenerSpec.schema.yaml#/properties/globalListenerSpec

  gateways:
    type: array
    items:
      type: object
      properties:
        additionalLabels:
          type: object
          additionalProperties:
            type: string
        gatewayAnnotations:
          type: object
          additionalProperties:
            type: string
        gatewaySpec:
          type: object
          properties:
            gatewayClassName:
              type: string
          additionalProperties: false
        listeners:
          type: array
          minItems: 1
          # Hard limit on the number of listeners per gateway
          maxItems: 64
          items:
            oneOf:
              # simple listener: string entry used as hostname with global listenerSpec values
              - type: string
                pattern: "^([a-zA-Z0-9]+(-[a-zA-Z0-9]+)*\\.)*(trydave\\.com|daveapi\\.com|daveapi\\.io)$"
              # complex listener: override selected listenerSpec fields
              - type: object
                properties:
                  listenerSpec:
                    $ref: ./listenerSpec.schema.yaml#/properties/listenerSpec
                additionalProperties: false
                required:
                  - listenerSpec
      additionalProperties: false
      required:
        - listeners
