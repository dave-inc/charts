{{- if .Values.enabled }}
{{- $labels := include "gateway-bundle.labels" . }}
{{- $default := .Values.gateways.default }}

{{- /* Ensure that all gateway names are unique within the release. */ -}}
{{- $seen := dict }}
{{- range $item := .Values.gateways.items }}
{{- if hasKey $seen $item.name }}
{{- fail (printf "Gateway names must be unique: '%s' is duplicated" $item.name) }}
{{- end }}
{{- $_ := set $seen $item.name true }}
{{- end }}

{{- range $item := .Values.gateways.items }}
{{- if ne $item.enabled false }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $item.name }}
  {{- with $default.metadata.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- $labels | nindent 4 }}
spec:
{{- if $item.rawSpec }}
  {{- toYaml $item.spec | nindent 2 }}
{{- else }}
  gatewayClassName: {{ $item.spec.gatewayClassName | default $default.spec.gatewayClassName }}
  listeners:
  {{- $lDef := $default.spec.listener }}
  {{- range $l := $item.spec.listeners }}
  {{- $proto := $l.protocol | default $lDef.protocol }}
  - hostname: {{ $l.hostname | quote }}
    name: {{ $l.name | default (printf "%s-%s" ($l.hostname | replace "." "-") (lower $proto)) | trunc 63 }}
    port: {{ $l.port | default $lDef.port }}
    protocol: {{ $proto }}
    allowedRoutes:
      namespaces:
        from: {{ dig "allowedRoutes" "namespaces" "from" $lDef.allowedRoutes.namespaces.from $l }}
    {{- if eq $proto "HTTPS" }}
    tls:
      {{- if $l.tls }}
      {{- toYaml $l.tls | nindent 6 }}
      {{- else }}
      {{- $secretName := "" }}
      {{- /* Chained access on `$default.ext` is intentional: Helm's nil
             tolerance lets callers omit the whole `ext` block. */ -}}
      {{- if $default.ext.tlsSecretGroups.enabled }}
        {{- range $g := ($default.ext.tlsSecretGroups.items | default list) }}
          {{- if not $secretName }}
            {{- if (or (eq $l.hostname $g.parentDomain) (hasSuffix (printf ".%s" $g.parentDomain) $l.hostname)) }}
              {{- $secretName = include "gateway-bundle.tlsSecretName" (dict "name" $g.parentDomain "gateway" $item.name) }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if not $secretName }}
        {{- $secretName = include "gateway-bundle.tlsSecretName" (dict "name" $l.hostname "gateway" $item.name) }}
      {{- end }}
      certificateRefs:
        - group: ""
          kind: Secret
          name: {{ $secretName }}
      mode: Terminate
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
