{{- $gatewayBundleLabels := include "gateway-bundle.labels" . }}
{{- $gatewayBundleFullname := include "gateway-bundle.fullname" . }}

{{- /* Ensure that all gateway names are unique within the release, whether specified by the user or defaulted by the chart. */ -}}
{{- $seenNames := dict }}
{{- range $i, $gatewayConfig := .Values.gateways }}
  {{- $resolvedName := $gatewayConfig.name | default (printf "%s-%d" $gatewayBundleFullname $i) }}
  {{- if hasKey $seenNames $resolvedName }}
    {{- fail (printf "duplicate gateway name %q at gateways[%d]; names must be unique within a release" $resolvedName $i) }}
  {{- end }}
  {{- $_ := set $seenNames $resolvedName true }}
{{- end }}

{{- /* Generate a Gateway resource for each gateway configuration, using the specified name or a default name based on the release and index. */ -}}
{{- range $i, $gatewayConfig := .Values.gateways }}
{{- $gatewayName := $gatewayConfig.name | default (printf "%s-%d" $gatewayBundleFullname $i) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gatewayName }}
  {{- with $gatewayConfig.gatewayAnnotations | default $.Values.gatewayAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- $gatewayBundleLabels | nindent 4 }}
spec:
  {{- with $gatewayConfig.gatewaySpec | default $.Values.gatewaySpec }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  listeners:
  {{- range $listener := $gatewayConfig.listeners }}
  {{- if typeIs "string" $listener }}
  - hostname: {{ $listener | quote }}
    allowedRoutes:
      namespaces:
        from: {{ $.Values.listenerSpec.allowedRoutes.namespaces.from }}
    name: {{ printf "%s-%s" ($listener | replace "." "-") (lower $.Values.listenerSpec.protocol) }}
    port: {{ $.Values.listenerSpec.port }}
    protocol: {{ $.Values.listenerSpec.protocol }}
    {{- if $.Values.listenerSpec.protocol | eq "HTTPS" }}
    tls:
      certificateRefs:
        - group: ""
          kind: Secret
          name: {{ (printf "%s-%s-tls" $listener $gatewayName) | replace "." "-" | trunc 63 }}
      mode: Terminate
    {{- end }}
    {{- else }}
    {{- with $listener.listenerSpec }}
  - hostname: {{ .hostname | quote }}
    {{- $allowedRoutes := default dict .allowedRoutes }}
    {{- $namespaces := default dict $allowedRoutes.namespaces }}
    allowedRoutes:
      namespaces:
        from: {{ $namespaces.from | default $.Values.listenerSpec.allowedRoutes.namespaces.from }}
    name: {{ .name | default (printf "%s-%s" (.hostname | replace "." "-") (lower (.protocol | default $.Values.listenerSpec.protocol))) }}
    port: {{ .port | default $.Values.listenerSpec.port }}
    protocol: {{ .protocol | default $.Values.listenerSpec.protocol }}
    {{- if .protocol | default $.Values.listenerSpec.protocol | eq "HTTPS" }}
    tls:
      certificateRefs:
        - group: ""
          kind: Secret
          name: {{ .hostname | replace "." "-" }}-{{ $gatewayName }}-tls
          name: {{ (printf "%s-%s-tls" .hostname $gatewayName) | replace "." "-" | trunc 63 }}
      mode: Terminate
    {{- end }}
    {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
