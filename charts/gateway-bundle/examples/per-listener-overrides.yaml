# Single Gateway with listeners that selectively override chart defaults.
# Demonstrates that any listener field (port, protocol, allowedRoutes, tls,
# name) can be set inline; unspecified fields still inherit from
# `gateways.default.spec.listener`.
#
# - service-a: pure default HTTPS listener with auto-generated TLS cert ref.
# - service-b: HTTP listener (no TLS block is rendered for non-HTTPS).
# - service-c: HTTPS but restricted to routes from the same namespace.
# - service-d: HTTPS with a caller-managed certificate (TLS block provided
#   verbatim instead of auto-generated).
enabled: true
gateways:
  items:
    - name: default
      spec:
        listeners:
          - hostname: service-a.trydave.com
          - hostname: service-b.trydave.com
            protocol: HTTP
            port: 80
          - hostname: service-c.trydave.com
            allowedRoutes:
              namespaces:
                from: Same
          - hostname: service-d.trydave.com
            tls:
              certificateRefs:
                - group: ""
                  kind: Secret
                  name: service-d-trydave-com-managed-tls
              mode: Terminate
