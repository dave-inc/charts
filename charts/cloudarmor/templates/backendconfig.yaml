apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ include "cloudarmor.name" . }}
  labels:
    {{- include "cloudarmor.labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- toYaml .Values.backendConfig | nindent 2 }}
