# Default values for the gatewayapi chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Optional override for the resource name prefix. If empty, Release.Name is used.
name: ""

# Master toggle. When false, no Gateway API resources are rendered.
enabled: false

# Additional labels applied to all resources created by this chart.
additionalLabels: {}

# Gateways the routes in this chart will reference. The chart does not currently
# create Gateway resources itself; gateways are typically created and managed by
# the `gateway-bundle` chart in the `shared-gateways` namespace.
gateways:
  standalone: {}
  shared:
    defaultNamespace: shared-gateways
    refs:
      - name: default
        # Overrides defaultNamespace for this reference
        namespace: shared-gateways

# HealthCheckPolicies list. Each item's `name` becomes the name of the rendered
# resource (e.g. `<name>`). Names must be unique across items.
healthCheckPolicies:
  enabled: true
  # When an items entry rawSpec is false, the spec block will be merged with defaults defined here.
  default:
    spec:
      default:
        config:
          type: HTTP
        logConfig:
          enabled: true
        checkIntervalSec: 5
        timeoutSec: 1
        healthyThreshold: 2
        unhealthyThreshold: 2
      targetRef:
        group: ""
        kind: Service
  items: []
## Basic health check policy example, with defaults for all fields except the required ones:
#
#   - name: example-service
#     spec:
#       default:
#         config:
#           httpHealthCheck:
#             port: 8080
#             requestPath: /
#      targetRef:
#        name: example-service

