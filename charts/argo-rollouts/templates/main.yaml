# All resources are rendered by the `rollouts` (argo-rollouts) dependency chart.

{{/*
Guard against a second Helm release installing this chart into the same cluster.
The argo-rollouts CRDs are cluster-scoped with fixed names regardless of release
name, so we use one of them as a fingerprint: if it already exists and is owned
by a different release, fail loudly instead of silently running two controllers
against the same Rollout objects.

Note: `lookup` only sees the live cluster, so this is a no-op (never blocks)
during `helm template`/`helm lint`/CI dry-runs without cluster access.
*/}}
{{- $existingCRD := lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" "rollouts.argoproj.io" }}
{{- if $existingCRD }}
  {{- $annotations := $existingCRD.metadata.annotations | default dict }}
  {{- $ownerName := index $annotations "meta.helm.sh/release-name" }}
  {{- $ownerNamespace := index $annotations "meta.helm.sh/release-namespace" }}
  {{- if and $ownerName (or (ne $ownerName .Release.Name) (ne $ownerNamespace .Release.Namespace)) }}
    {{- fail (printf "argo-rollouts CRDs are already owned by release '%s' in namespace '%s'. This chart must be installed once per cluster - do not create a second release. Current release: '%s' in namespace '%s'." $ownerName $ownerNamespace .Release.Name .Release.Namespace) }}
  {{- end }}
{{- end }}
