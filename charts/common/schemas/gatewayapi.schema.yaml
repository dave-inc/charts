$schema: "http://json-schema.org/draft-07/schema#"
type: object
definitions: {}
properties:
  gatewayapi:
    type: object
    properties:
      enabled:
        type: boolean
        default: false
      gateways:
        type: object
      routes:
        type: object
        properties:
          main:
            $ref: "#/properties/gatewayapi/$defs/route"
        additionalProperties:
          $ref: "#/properties/gatewayapi/$defs/route"
        required:
          - main
      healthCheckPolicies:
        type: object
        properties:
          main:
            $ref: "#/properties/gatewayapi/$defs/healthCheckPolicy"
        additionalProperties:
          $ref: "#/properties/gatewayapi/$defs/healthCheckPolicy"
        required:
          - main
    $defs:
      healthCheckPolicy:
        type: object
        properties:
          rawSpec:
            type: boolean
            const: true
          spec:
            type: object
            properties:
              default:
                type: object
                properties:
                  checkIntervalSec:
                    type: integer
                    minimum: 1
                  timeoutSec:
                    type: integer
                    minimum: 1
                  healthyThreshold:
                    type: integer
                    minimum: 1
                  unhealthyThreshold:
                    type: integer
                    minimum: 1
                  logConfig:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                    required:
                      - enabled
                    additionalProperties: false
                  config:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - HTTP
                          - GRPC
                      httpHealthCheck:
                        type: object
                        properties:
                          port:
                            type: integer
                          requestPath:
                            type: string
                        required:
                          - port
                          - requestPath
                      grpcHealthCheck:
                        type: object
                        properties:
                          port:
                            type: integer
                        required:
                          - port
                    required:
                      - type
                    anyOf:
                      - required:
                        - httpHealthCheck
                      - required:
                        - grpcHealthCheck
              targetRef:
                type: object
                properties:
                  group:
                    type: string
                    const: ""
                  kind:
                    type: string
                    const: Service
                  name:
                    type: string
                required:
                  - group
                  - kind
                  - name
            additionalProperties: false
            required:
              - default
              - targetRef
        required:
          - rawSpec
          - spec
      route:
        type: object
        properties:
          kind:
            type: string
            enum:
              - HTTPRoute
              - GRPCRoute
          rawSpec:
            type: boolean
            const: true
          spec:
            type: object
            properties:
              hostnames:
                type: array
                minItems: 1
                items:
                  type: string
                  pattern: "^([a-zA-Z0-9]+(-[a-zA-Z0-9]+)*\\.)*(trydave\\.com|daveapi\\.com|daveapi\\.io)$"
              parentRefs:
                type: array
                # Only a single parent ref is supported for the time being
                minItems: 1
                maxItems: 1
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      pattern: "^shared-gw-\\d+$"
                    namespace:
                      type: string
                      const: shared-gateways
                  required:
                    - name
                    - namespace
              rules:
                type: array
                minItems: 1
                items:
                  type: object
                  properties:
                    backendRefs:
                      type: array
                      # For the time being, we only support a single backend ref per rule, so minItems and maxItems are both set to 1
                      minItems: 1
                      maxItems: 1
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          port:
                            type: integer
                          weight:
                            type: integer
                            # For the time being, we only support a single backend ref per rule, so weight must be 1
                            const: 1
                          group:
                            type: string
                            const: ""
                          kind:
                            type: string
                            const: Service
                        required:
                          - name
                          - port
                          - weight
                        additionalProperties: false
                    matches:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        properties:
                          path:
                            type: object
                            properties:
                              type:
                                type: string
                                enum:
                                  - PathPrefix
                                  - PathExact
                                  - PathRegex
                              value:
                                type: string
                            required:
                              - type
                              - value
                            additionalProperties: false
                        additionalProperties: false
            required:
              - hostnames
              - parentRefs
              - rules
        required:
          - kind
          - rawSpec
          - spec
    additionalProperties: false
